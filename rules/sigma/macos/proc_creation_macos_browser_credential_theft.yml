title: Browser Credential Store Access
id: db01bf97-33ca-4ce4-8ee7-7bbd4b4844f8
status: experimental
description: >
  Detects a process reading or copying a browser credential, cookie or wallet
  store (Chrome/Chromium Login Data and Cookies, Firefox logins.json and key4.db,
  and browser-extension wallet storage). This is the core of the AMOS / Poseidon
  stealer playbook; together with TCC access and the keychain-dump rule it covers
  the three data targets of the current macOS stealer wave.
references:
  - https://attack.mitre.org/techniques/T1555/003/
author: rustinel-rules
date: 2026-07-09
tags:
  - attack.credential-access
  - attack.t1555.003
logsource:
  category: process_creation
  product: macos
detection:
  selection_tool:
    Image|endswith:
      - '/sqlite3'
      - '/cp'
      - '/ditto'
      - '/rsync'
  selection_target:
    CommandLine|contains:
      - '/Login Data'
      - 'Cookies.binarycookies'
      - '/Library/Cookies'
      - '/logins.json'
      - '/key4.db'
      - '/Local Extension Settings/'
  condition: selection_tool and selection_target
falsepositives:
  - Backup tools copying whole browser profiles; filter known backup images. The
    specific-file targeting keeps direct hits high-signal.
level: high
rustinel:
  telemetry:
    - process_creation
  expected_false_positive_level: low
  test_status: none
