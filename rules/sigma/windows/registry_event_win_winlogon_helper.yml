title: Winlogon Helper DLL or Shell Modification
id: 52b94494-756b-40d7-af01-8d0c7d54a6cc
status: experimental
description: >
  Detects modification of Winlogon Userinit, Shell, Notify or Taskman values,
  which run an attacker-chosen binary at logon. Complements the Run-key
  persistence rule with a different key in the same technique family; commonly
  abused by commodity stealers.
  Note: Rustinel exposes the registry key path in TargetObject and the value name
  in Details, so the watched value names are matched in either field.
references:
  - https://attack.mitre.org/techniques/T1547/004/
author: rustinel-rules
date: 2026-07-09
tags:
  - attack.persistence
  - attack.privilege-escalation
  - attack.t1547.004
logsource:
  category: registry_event
  product: windows
detection:
  selection_path:
    TargetObject|contains: '\Microsoft\Windows NT\CurrentVersion\Winlogon'
  value_in_keyname:
    TargetObject|contains:
      - '\Userinit'
      - '\Shell'
      - '\Notify'
      - '\Taskman'
  value_in_details:
    Details|contains:
      - 'Userinit'
      - 'Shell'
      - 'Notify'
      - 'Taskman'
  condition: selection_path and (value_in_keyname or value_in_details)
falsepositives:
  - VDI and kiosk products legitimately replace the Shell value; tune per host.
level: medium
rustinel:
  telemetry:
    - registry_event
  expected_false_positive_level: medium
  test_status: atomic
